<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>익명 채팅방</title>
    <link rel="stylesheet" href="/styles.css?v=4" />
  </head>
  <body>
    <main class="chat-shell">
      <aside class="side-rail" aria-label="접속 정보">
        <div class="online-pill">
          <span class="dot" aria-hidden="true"></span>
          <strong id="onlineCount">0</strong>
          <span>명</span>
        </div>
      </aside>

      <section class="room" aria-label="익명 채팅방">
        <header class="room-header">
          <div>
            <h1>익명 채팅방</h1>
          </div>
          <div id="status" class="status">대기 중</div>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chatForm" class="composer" autocomplete="off">
          <input
            id="messageInput"
            name="message"
            type="text"
            maxlength="500"
            placeholder="메시지 입력"
            aria-label="메시지"
            required
          />
          <button type="submit">전송</button>
        </form>
      </section>
    </main>

    <div id="nameGate" class="name-gate" role="dialog" aria-modal="true" aria-labelledby="nameTitle">
      <form id="nameForm" class="name-panel" autocomplete="off">
        <h2 id="nameTitle">닉네임 선택</h2>
        <input
          id="nicknameInput"
          name="nickname"
          type="text"
          maxlength="16"
          placeholder="닉네임"
          aria-label="닉네임"
          required
        />
        <button type="submit">입장</button>
      </form>
    </div>

    <script src="/app.js?v=4" defer></script>
  </body>
</html>
