<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>관리자</title>
    <link rel="stylesheet" href="/styles.css?v=5" />
  </head>
  <body class="admin-page">
    <main class="admin-shell">
      <section class="admin-panel">
        <h1>관리자</h1>
        <form id="adminForm" class="admin-form" autocomplete="off">
          <input
            id="adminPassword"
            type="password"
            placeholder="비밀번호"
            aria-label="비밀번호"
            required
          />
          <button type="submit">로그인</button>
        </form>

        <div id="adminActions" class="admin-actions" hidden>
          <button id="clearButton" type="button">메시지 초기화</button>
        </div>

        <p id="adminStatus" class="admin-status">비밀번호를 입력하세요.</p>
      </section>
    </main>

    <script src="/admin.js?v=5" defer></script>
  </body>
</html>
